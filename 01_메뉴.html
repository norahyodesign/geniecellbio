<!--  지니셀바이오 — 01. 네비게이션  -->
<div id="gcb-nav">
<style>
#gcb-nav *{margin:0;padding:0;box-sizing:border-box}
#gcb-nav{
  --navy:#1B3A6B;--accent:#2E7CF6;--white:#fff;--gray:#86868b;
  --font:'DM Sans',system-ui,sans-serif;--max-w:1080px;
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,0.82);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.05);
  font-family:var(--font);-webkit-font-smoothing:antialiased;
}
#gcb-nav .ni{max-width:var(--max-w);margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:48px}
#gcb-nav .nl{font-size:16px;font-weight:700;color:var(--navy);letter-spacing:-0.03em;text-decoration:none;display:flex;align-items:center;gap:8px}
#gcb-nav .nl i{width:28px;height:28px;background:var(--navy);border-radius:7px;display:flex;align-items:center;justify-content:center}
#gcb-nav .nl i svg{width:15px;height:15px}
#gcb-nav .nk{display:flex;align-items:center;gap:28px}
#gcb-nav .nk a{font-size:12px;font-weight:500;color:var(--gray);text-decoration:none;letter-spacing:0.01em;transition:color .2s}
#gcb-nav .nk a:hover{color:var(--navy)}
#gcb-nav .nc{font-size:12px;font-weight:600;color:var(--white);background:var(--accent);border:none;border-radius:18px;padding:7px 18px;cursor:pointer;font-family:var(--font);transition:background .2s}
#gcb-nav .nc:hover{background:#1a6ae0}
#gcb-nav .nm{display:none;background:none;border:none;cursor:pointer;padding:4px}
#gcb-nav .nm svg{width:20px;height:20px;color:var(--navy)}
@media(max-width:768px){
  #gcb-nav .nk{display:none;position:fixed;top:48px;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);flex-direction:column;padding:20px 28px;gap:16px;border-bottom:1px solid rgba(0,0,0,0.05)}
  #gcb-nav .nk.open{display:flex}
  #gcb-nav .nk a{font-size:15px}
  #gcb-nav .nc{width:100%;text-align:center;padding:10px}
  #gcb-nav .nm{display:block}
}
</style>
<div class="ni">
  <a href="#" class="nl"><i><svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="white"/></svg></i>GenicellBio</a>
  <div class="nk" id="gcb-nk">
    <a href="/about">회사소개</a><a href="/services">서비스</a><a href="/contact">문의</a>
    <button class="nc" onclick="location.href='/contact'">상담 신청</button>
  </div>
  <button class="nm" onclick="document.getElementById('gcb-nk').classList.toggle('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
</div>
</div>
