<!--  지니셀바이오 — 06. 문의하기 【약 — 컴팩트】  -->
<div id="gcb-ct">
<style>
#gcb-ct *{margin:0;padding:0;box-sizing:border-box}
#gcb-ct{
  --navy:#0E2040;--accent:#2E7CF6;--white:#fff;--radius:20px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
  --max-w:1080px;
  background:var(--navy);color:var(--white);
  font-family:var(--font);-webkit-font-smoothing:antialiased;padding:120px 0;
}
#gcb-ct .cc{max-width:var(--max-w);margin:0 auto;padding:0 28px;text-align:center}
#gcb-ct .ch{margin-bottom:48px}
#gcb-ct .co{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:20px}
#gcb-ct .ch h2{font-size:clamp(36px,4vw,52px);font-weight:700;line-height:1.2;letter-spacing:-0.04em;margin-bottom:16px}
#gcb-ct .ch p{font-size:18px;line-height:1.65;letter-spacing:-0.01em;color:rgba(255,255,255,0.45);max-width:440px;margin:0 auto}

#gcb-ct .ccard{
  max-width:560px;margin:0 auto;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;padding:48px 40px;text-align:left;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#gcb-ct .cf{display:flex;flex-direction:column;gap:14px}
#gcb-ct .cr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
#gcb-ct .fg{display:flex;flex-direction:column;gap:5px}
#gcb-ct .fg label{font-size:12px;font-weight:500;color:rgba(255,255,255,0.4)}
#gcb-ct .fg input,#gcb-ct .fg textarea,#gcb-ct .fg select{
  padding:13px 16px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);border-radius:12px;
  color:var(--white);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s;
}
#gcb-ct .fg input::placeholder,#gcb-ct .fg textarea::placeholder{color:rgba(255,255,255,0.18)}
#gcb-ct .fg input:focus,#gcb-ct .fg textarea:focus,#gcb-ct .fg select:focus{border-color:var(--accent)}
#gcb-ct .fg textarea{resize:vertical;min-height:90px}
#gcb-ct .fg select{appearance:none;cursor:pointer}
#gcb-ct .fg select option{background:var(--navy);color:var(--white)}
#gcb-ct .csub{
  width:100%;padding:15px;margin-top:8px;background:var(--accent);color:var(--white);
  border:none;border-radius:24px;font-size:16px;font-weight:600;font-family:var(--font);
  cursor:pointer;transition:all .25s;
}
#gcb-ct .csub:hover{background:#1a6ae0;transform:scale(1.01)}

#gcb-ct .ci{display:flex;justify-content:center;gap:48px;margin-top:56px;flex-wrap:wrap}
#gcb-ct .cii{text-align:center}
#gcb-ct .cii svg{width:20px;height:20px;color:var(--accent);margin-bottom:8px}
#gcb-ct .cit{font-size:11px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
#gcb-ct .civ{font-size:14px;color:rgba(255,255,255,0.7)}

@media(max-width:768px){
  #gcb-ct{padding:80px 0}
  #gcb-ct .cc{padding:0 20px}
  #gcb-ct .ccard{padding:36px 24px}
  #gcb-ct .cr{grid-template-columns:1fr}
  #gcb-ct .ci{flex-direction:column;gap:24px}
}
</style>
<div class="cc">
  <div class="ch"><div class="co">Contact Us</div><h2>프로젝트를 시작해 보세요</h2><p>어느 단계에서든, 전문가가 최적의 솔루션을 안내합니다</p></div>
  <div class="ccard">
    <form class="cf" onsubmit="event.preventDefault()">
      <div class="cr"><div class="fg"><label>성함</label><input type="text" placeholder="홍길동"></div><div class="fg"><label>소속기관</label><input type="text" placeholder="기관명"></div></div>
      <div class="fg"><label>이메일</label><input type="email" placeholder="email@example.com"></div>
      <div class="fg"><label>문의 유형</label><select><option value="">선택해주세요</option><option>위탁생산 (CMO)</option><option>품질시험 (QC)</option><option>인허가 컨설팅 (RA)</option><option>원료세포 공급</option><option>바이오뱅킹</option><option>기타</option></select></div>
      <div class="fg"><label>문의 내용</label><textarea placeholder="간단히 설명해주세요"></textarea></div>
      <button type="submit" class="csub">문의 보내기</button>
    </form>
  </div>
  <div class="ci">
    <div class="cii"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg><div class="cit">주소</div><div class="civ">서울시 송파구 충민로 66</div></div>
    <div class="cii"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg><div class="cit">전화</div><div class="civ">02-1234-5678</div></div>
    <div class="cii"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg><div class="cit">이메일</div><div class="civ">contact@genicellbio.com</div></div>
  </div>
</div>
</div>
