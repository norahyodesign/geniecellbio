<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[CDN 테스트] 지니셀바이오</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050a14; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
    #cdn-status {
      position: fixed; bottom: 16px; right: 16px; z-index: 9999;
      background: rgba(0,0,0,0.82); color: #fff; font-size: 12px; font-family: monospace;
      padding: 12px 16px; border-radius: 8px; min-width: 260px; line-height: 2;
      border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);
    }
    #cdn-status .ok      { color: #34c759; }
    #cdn-status .err     { color: #ff3b30; }
    #cdn-status .loading { color: #ffd60a; }
    #cdn-url { color: rgba(255,255,255,0.3); font-size: 10px; word-break: break-all; }
  </style>
</head>
<body>

  <div id="cdn-status">
    <strong>CDN 로드 상태</strong><br>
    <span id="s-index" class="loading">⏳ index.html 로딩 중…</span><br>
    <span id="cdn-url"></span>
  </div>

  <script>
    var CDN = 'https://cdn.jsdelivr.net/gh/norahyodesign/geniecellbio@main/index.html';
    document.getElementById('cdn-url').textContent = CDN;

    // CDN 접근 가능 여부 먼저 확인
    fetch(CDN)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function() {
        document.getElementById('s-index').className = 'ok';
        document.getElementById('s-index').textContent = '✅ index.html 로드 성공';

        // CDN URL을 iframe으로 직접 렌더링 (상대 경로 자산도 CDN 기준 처리)
        var iframe = document.createElement('iframe');
        iframe.src = CDN;
        document.body.appendChild(iframe);
      })
      .catch(function(err) {
        document.getElementById('s-index').className = 'err';
        document.getElementById('s-index').textContent = '❌ 로드 실패: ' + err.message;
      });
  </script>
</body>
</html>
