<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[CDN 테스트] 지니셀바이오</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    #cdn-status {
      position: fixed; bottom: 16px; right: 16px; z-index: 9999;
      background: #1d1d1f; color: #fff; font-size: 12px; font-family: monospace;
      padding: 12px 16px; border-radius: 8px; min-width: 220px;
      line-height: 1.8;
    }
    #cdn-status .ok  { color: #34c759; }
    #cdn-status .err { color: #ff3b30; }
    #cdn-status .loading { color: #ffd60a; }
  </style>
</head>
<body>
  <div id="sections"></div>

  <div id="cdn-status">
    <strong>CDN 로드 상태</strong><br>
    <span id="s-menu"    class="loading">⏳ 01_menu</span><br>
    <span id="s-hero"    class="loading">⏳ 02_hero</span><br>
    <span id="s-about"   class="loading">⏳ 03_about</span><br>
    <span id="s-services"class="loading">⏳ 04_services</span><br>
    <span id="s-contact" class="loading">⏳ 06_contact</span><br>
    <span id="s-footer"  class="loading">⏳ 07_footer</span>
  </div>

  <script>
    const BASE = 'https://cdn.jsdelivr.net/gh/norahyodesign/geniecellbio@main/';
    const sections = [
      { file: '01_menu.html',     id: 'menu'     },
      { file: '02_hero.html',     id: 'hero'     },
      { file: '03_about.html',    id: 'about'    },
      { file: '04_services.html', id: 'services' },
      { file: '06_contact.html',  id: 'contact'  },
      { file: '07_footer.html',   id: 'footer'   },
    ];

    const container = document.getElementById('sections');

    function execScripts(root) {
      root.querySelectorAll('script').forEach(function(old) {
        const s = document.createElement('script');
        if (old.src) s.src = old.src;
        else s.textContent = old.textContent;
        old.parentNode.replaceChild(s, old);
      });
    }

    function setStatus(id, ok, text) {
      const el = document.getElementById('s-' + id);
      el.className = ok ? 'ok' : 'err';
      el.textContent = (ok ? '✅ ' : '❌ ') + text;
    }

    sections.forEach(({ file, id }) => {
      const div = document.createElement('div');
      container.appendChild(div);

      fetch(BASE + file)
        .then(r => {
          if (!r.ok) throw new Error(r.status);
          return r.text();
        })
        .then(html => {
          div.innerHTML = html;
          execScripts(div);
          setStatus(id, true, file);
        })
        .catch(err => {
          setStatus(id, false, file + ' (' + err.message + ')');
        });
    });
  </script>
</body>
</html>
